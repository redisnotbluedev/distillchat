{% from "macros.html" import icon %}
<div class="chat-input">
	<div class="attachments" id="attachments"></div>
	<div contenteditable id="chatInput" class="empty"></div>
	<div class="button-row">
		<div>
			<button onclick="document.getElementById('filePicker').click()">
				{{ icon("plus") }}
			</button>
		</div>
		<div>
			{% set default = models | selectattr("default") | first %}
			<button id="modelPicker" class="model-button" aria-haspopup="menu" popovertarget="modelMenu">{{ default.name }} {{ icon("chevron-down") }}</button>
			<menu role="menu" id="modelMenu" popover>
				{% for model in models %}
					<li role="none">
						<button role="menuitem" class="{{ "selected" if model == default else "" }}" data-id="{{ model.id }}">
							<div>
								<h3>{{ model.name }}</h3>
								<p>{{ model.description }}</p>
							</div>
							{{ icon("check") }}
						</button>
					</li>
				{% endfor %}
			</menu>
			<button class="send-button" id="sendButton" disabled>
				{{ icon("arrow-up") }}
			</button>
		</div>
	</div>

	<input type="file" id="filePicker" multiple>
</div>
