{% macro symbol(name) %}
	<symbol id="icon-{{ name }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
		{% include "icons/" + name + ".svg" %}
	</symbol>
{% endmacro %}

{% macro icon(name) %}
	<svg width="1em" height="1em"><use href="#icon-{{ name }}"></use></svg>
{% endmacro %}
